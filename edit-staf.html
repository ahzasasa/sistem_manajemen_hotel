<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Edit Data Staf | Hotel Reservasi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="edit-staf.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                    <h5 class="mb-0 fw-bold text-primary"><i class="fa-solid fa-user-pen"></i> Edit Data Staf</h5>
                    <a href="admin.html" class="btn btn-sm btn-outline-secondary"><i class="fa-solid fa-arrow-left"></i> Kembali</a>
                </div>
                <div class="card-body p-4">
                    <form id="form-edit-staf">
                        <div class="mb-3">
                            <label class="form-label text-muted small">ID / Kode Staf</label>
                            <input type="text" id="edit-id" class="form-control bg-light" readonly>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Nama Lengkap</label>
                                <input type="text" id="edit-nama" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Posisi / Jabatan</label>
                                <select id="edit-posisi" class="form-select" required>
                                    <option value="1">Manager</option>
                                    <option value="2">Back Office</option>
                                    <option value="3">Front Office</option>
                                    <option value="4">Housekeeping</option>
                                </select>
                            </div>
                        </div>

                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label class="form-label">Nomor Telepon</label>
                                <input type="text" id="edit-telepon" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Username Login</label>
                                <input type="text" id="edit-username" class="form-control" required>
                            </div>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary" id="btn-simpan">
                                <i class="fa-solid fa-save"></i> Simpan Perubahan
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="edit-staf.js"></script>
</body>
</html>
