<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>E-Voucher Hotel</title>
    <style>
        /* Desain Khusus Kertas A4 / Print dengan Tema Hotel Reservasi */
        body { 
            font-family: Arial, sans-serif; 
            background-color: #E6E2DA; /* Background krem sesuai tema */
            margin: 0; 
            padding: 30px 20px; 
        }
        
        .voucher-container { 
            max-width: 800px; 
            margin: 0 auto; 
            background: white; 
            padding: 40px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            border-top: 10px solid #154230; /* Aksen hijau gelap di atas */
            border-radius: 4px;
        }
        
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid #A6824A; /* Garis emas */
            padding-bottom: 20px; 
            margin-bottom: 25px; 
        }
        
        .header h1 { 
            color: #154230; /* Hijau gelap */
            margin: 0; 
            font-size: 28px; 
            letter-spacing: 1px;
        }
        
        .header p { 
            margin: 5px 0 0 0; 
            color: #A6824A; /* Emas */
            font-weight: bold; 
            letter-spacing: 2px;
            font-size: 14px;
        }
        
        .status-box { text-align: right; }
        
        .status-badge { 
            color: #154230; 
            font-weight: bold; 
            font-size: 18px; 
            text-transform: uppercase; 
            border: 2px solid #154230; 
            padding: 6px 12px; 
            border-radius: 4px; 
            display: inline-block;
        }
        
        table { width: 100%; border-collapse: collapse; margin-bottom: 35px; }
        td { padding: 12px 0; border-bottom: 1px solid #E6E2DA; vertical-align: top; color: #101111; }
        .col-label { font-weight: bold; width: 35%; color: #666; }
        
        .section-title { 
            background-color: #154230; 
            color: white; 
            padding: 10px 15px; 
            font-weight: bold; 
            margin-bottom: 15px; 
            border-left: 6px solid #A6824A; /* Pita emas di kiri */
            letter-spacing: 1px;
        }
        
        .print-btn { 
            display: block; 
            width: 100%; 
            text-align: center; 
            background: #5D1E21; /* Merah marun untuk tombol aksi */
            color: white; 
            padding: 15px; 
            text-decoration: none; 
            font-weight: bold; 
            margin-top: 30px; 
            border: none; 
            cursor: pointer;
            font-size: 16px;
            border-radius: 4px;
            transition: background 0.3s;
        }
        
        .print-btn:hover {
            background: #3d1315;
        }
        
        #v-total {
            color: #5D1E21; /* Merah marun untuk highlight harga */
            font-weight: bold; 
            font-size: 22px;
        }

        /* Hilangkan elemen yang tidak perlu saat dicetak ke PDF/Kertas */
        @media print {
            body { background: white; padding: 0; }
            .voucher-container { box-shadow: none; padding: 0; border-top: none; }
            .print-btn { display: none; }
        }
    </style>
</head>
<body>

<div class="voucher-container">
    <div class="header">
        <div>
            <h1>HOTEL RESERVASI</h1>
            <p>OFFICIAL E-VOUCHER</p>
        </div>
        <div class="status-box">
            <div id="v-status" class="status-badge">CONFIRMED</div>
            <div style="font-size: 12px; color: #666; margin-top: 8px;">Order ID: <strong id="v-order-id" style="color: #101111;">-</strong></div>
        </div>
    </div>

    <table>
        <tr>
            <td class="col-label">Nama Tamu</td>
            <td id="v-nama" style="font-weight: bold; font-size: 18px;">-</td>
        </tr>
        <tr>
            <td class="col-label">Nomor Telepon</td>
            <td id="v-telepon">-</td>
        </tr>
    </table>

    <div class="section-title" id="v-section-title">DETAIL LAYANAN</div>
    <table>
        <tr id="row-1">
            <td class="col-label" id="lbl-1">-</td>
            <td id="val-1" style="font-weight: bold;">-</td>
        </tr>
        <tr id="row-2">
            <td class="col-label" id="lbl-2">-</td>
            <td id="val-2">-</td>
        </tr>
        <tr id="row-3">
            <td class="col-label" id="lbl-3">-</td>
            <td id="val-3">-</td>
        </tr>
        <tr id="row-4">
            <td class="col-label" id="lbl-4">-</td>
            <td style="font-weight: bold; font-size: 18px; color: #154230;" id="val-4">-</td>
        </tr>
    </table>

    <div class="section-title">DETAIL PEMBAYARAN</div>
    <table>
        <tr>
            <td class="col-label">Metode Pembayaran</td>
            <td id="v-metode" style="font-weight: bold;">-</td>
        </tr>
        <tr>
            <td class="col-label">Total Pembayaran</td>
            <td id="v-total">-</td>
        </tr>
    </table>

    <div style="margin-top: 40px; font-size: 13px; color: #666; line-height: 1.5; border-top: 1px dashed #ccc; padding-top: 20px;">
        <strong>Catatan Penting:</strong><br>
        * Mohon tunjukkan e-voucher ini beserta kartu identitas resmi Anda saat tiba di lokasi.<br>
    </div>

    <button class="print-btn" onclick="window.print()">🖨️ CETAK SEBAGAI PDF</button>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        const email = urlParams.get('email');
        const opsiWaktu = { day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' };

        if(id && email) {
            fetch(`http://127.0.0.1:5000/api/cek-pesanan?id=${id}&email=${email}`)
            .then(res => res.json())
            .then(result => {
                if(result.status === 'success') {
                    const p = result.data;
                    const kategori = result.kategori;
                    
                    // --- DATA UMUM ---
                    document.getElementById('v-order-id').textContent = p.id_reservasi;
                    document.getElementById('v-nama').textContent = p.nama_lengkap;
                    document.getElementById('v-telepon').textContent = p.nomor_telepon;
                    document.getElementById('v-status').textContent = p.status_pesanan.toUpperCase();
                    
                    let hargaFinal = 0;

                    // --- JIKA VOUCHER KAMAR ---
                    if (kategori === 'kamar') {
                        document.getElementById('v-section-title').textContent = "DETAIL KAMAR";
                        
                        document.getElementById('lbl-1').textContent = "Tipe Kamar";
                        document.getElementById('val-1').textContent = p.nama_tipe;
                        
                        document.getElementById('lbl-2').textContent = "Tanggal Masuk (Check-in)";
                        document.getElementById('val-2').textContent = new Date(p.tanggal_masuk).toLocaleString('id-ID', opsiWaktu).replace('.', ':') + ' WIB';
                        
                        document.getElementById('lbl-3').textContent = "Tanggal Keluar (Check-out)";
                        document.getElementById('val-3').textContent = new Date(p.tanggal_keluar).toLocaleString('id-ID', opsiWaktu).replace('.', ':') + ' WIB';
                        
                        document.getElementById('lbl-4').textContent = "Nomor Kamar";
                        document.getElementById('val-4').textContent = p.nomor_kamar;
                        
                        hargaFinal = p.harga_terkunci;
                    } 
                    // --- JIKA VOUCHER FASILITAS ---
                    else if (kategori === 'fasilitas') {
                        document.getElementById('v-section-title').textContent = "DETAIL FASILITAS";
                        
                        document.getElementById('lbl-1').textContent = "Layanan Terpilih";
                        document.getElementById('val-1').textContent = p.layanan;
                        
                        const tglAcara = new Date(p.tanggal_acara).toLocaleDateString('id-ID', {day: 'numeric', month: 'long', year: 'numeric'});
                        document.getElementById('lbl-2').textContent = "Tanggal Acara";
                        document.getElementById('val-2').textContent = tglAcara;
                        
                        document.getElementById('lbl-3').textContent = "Waktu Mulai";
                        document.getElementById('val-3').textContent = p.waktu_mulai + ' WIB';
                        
                        // Sembunyikan baris ke-4 karena fasilitas tidak ada nomor kamar
                        document.getElementById('row-4').style.display = 'none';
                        
                        hargaFinal = p.total_harga;
                    }

                    // --- PEMBAYARAN ---
                    document.getElementById('v-metode').textContent = p.metode_pembayaran || 'Transfer Bank / Lainnya';
                    document.getElementById('v-total').textContent = new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(hargaFinal);
                    
                } else {
                    alert('Data pesanan tidak ditemukan!');
                }
            })
            .catch(err => console.error(err));
        }
    });
</script>
</body>
</html>
