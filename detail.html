<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Kamar - Hotel Reservasi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">HOTEL RESERVASI</div>
        <nav>
            <ul>
                <li><a href="index.html">Beranda</a></li>
                <li><a href="kamar.html" style="font-weight: bold; border-bottom: 2px solid #101111;">Kamar</a></li>
                <li><a href="fasilitas.html">Fasilitas</a></li>
                <li><a href="cek-pesanan.html">Cek Pesanan</a></li>
            </ul>
        </nav>
    </header>

    <div class="detail-container">
        
        <div class="detail-content">
            <h1 id="detail-nama">Memuat Data Kamar...</h1>
            <img id="detail-img" src="" class="detail-hero-img" alt="Kamar">
            
            <h3>FASILITAS UTAMA</h3>
            <div class="amenities-grid">
                <div class="amenity-item">🛏️ <span id="detail-kapasitas"></span></div>
                <div class="amenity-item">📶 Wi-Fi Kecepatan Tinggi</div>
                <div class="amenity-item">📺 Smart TV LED 40"</div>
                <div class="amenity-item">☕ Pembuat Kopi & Teh</div>
                <div class="amenity-item">❄️ AC Sentral</div>
                <div class="amenity-item">🚿 Air Panas/Dingin</div>
            </div>
            
            <h3>DESKRIPSI KAMAR</h3>
            <p id="detail-deskripsi">-</p>
        </div>

        <div class="engine-sidebar">
            <div class="booking-widget">
                <h3 style="color: #101111; margin-bottom: 10px; border-bottom: 2px solid #E6E2DA; padding-bottom: 10px; font-size: 1.2rem;">Formulir Pemesanan</h3>
                <h2 id="detail-harga" style="color: #154230; margin-bottom: 20px; font-size: 1.5rem;">Rp 0</h2>
                
                <form id="form-booking" class="sidebar-form">
                    <label>Nama Lengkap (Sesuai KTP)</label>
                    <input type="text" id="book-nama" placeholder="Masukkan nama Anda" required>
                    
                    <label>Email Pemesan</label>
                    <input type="email" id="book-email" placeholder="nama@email.com" required>
                    
                    <label>Nomor Telepon / WhatsApp</label>
                    <input type="number" id="book-tlp" placeholder="0812xxxxxx" required>
                    
                    <label>Waktu Check-In</label>
                    <input type="datetime-local" id="book-in" required>
                    
                    <label>Waktu Check-Out</label>
                    <input type="datetime-local" id="book-out" required>

                    <label>Total Pembayaran:</label>
                    <input type="text" id="total-display" readonly>
                    <input type="hidden" id="total-harga-value">
                    
                    <label style="margin-top: 15px; display: block; font-weight: bold;">Metode Pembayaran:</label>
                    <select id="metode-bayar" style="width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; background-color: white;">
                        
                        <optgroup label="1. Credit/Debit Card">
                            <option value="Credit Card - Visa">Visa</option>
                            <option value="Credit Card - Mastercard">Mastercard</option>
                            <option value="Credit Card - AMEX">American Express (AMEX)</option>
                            <option value="Credit Card - JCB">JCB</option>
                            <option value="Credit Card - UnionPay">UnionPay</option>
                        </optgroup>
                        
                        <optgroup label="2. Bank Transfer">
                            <option value="Transfer - BCA">BCA</option>
                            <option value="Transfer - Mandiri">Mandiri</option>
                            <option value="Transfer - BNI">BNI</option>
                            <option value="Transfer - BRI">BRI</option>
                            <option value="Transfer - CIMB Niaga">CIMB Niaga</option>
                            <option value="Transfer - Permata">Permata</option>
                        </optgroup>
                        
                        <optgroup label="3. Virtual Account / E-Wallet">
                            <option value="E-Wallet - GoPay">GoPay</option>
                            <option value="E-Wallet - OVO">OVO</option>
                            <option value="E-Wallet - DANA">DANA</option>
                            <option value="E-Wallet - ShopeePay">ShopeePay</option>
                            <option value="E-Wallet - LinkAja">LinkAja</option>
                        </optgroup>
                        
                        <optgroup label="4. QR Payment">
                            <option value="QR - QRIS">QRIS</option>
                            <option value="QR - Alipay">Alipay QR</option>
                            <option value="QR - WeChat Pay">WeChat Pay QR</option>
                        </optgroup>
                        
                        <optgroup label="5. OTA Payment">
                            <option value="OTA - Traveloka">Traveloka</option>
                            <option value="OTA - Agoda">Agoda</option>
                            <option value="OTA - Booking.com">Booking.com</option>
                            <option value="OTA - Tiket.com">Tiket.com</option>
                            <option value="OTA - Expedia">Expedia</option>
                        </optgroup>
                        
                        <optgroup label="6. Pembayaran Langsung & Korporat">
                            <option value="Cash">Cash (Tunai)</option>
                            <option value="Pay at Hotel">Pay at Hotel (Bayar saat Check-in)</option>
                            <option value="Corporate Billing">Corporate Billing</option>
                        </optgroup>
                        
                        <optgroup label="7. Pay Later & Cicilan">
                            <option value="PayLater - SPayLater">SPayLater</option>
                            <option value="PayLater - Kredivo">Kredivo</option>
                            <option value="PayLater - Akulaku">Akulaku</option>
                            <option value="Cicilan Kartu Kredit">Kartu Kredit Cicilan</option>
                        </optgroup>

                    </select>
                    
                    <button type="submit" class="btn-book-now" style="width: 100%; padding: 12px; font-size: 1rem;">
                        KONFIRMASI PESANAN
                    </button>
                </form>
            </div>
        </div>

    </div>

    <footer class="site-footer">
        <div class="footer-bottom">
            <p style="text-align: center;">Hak Cipta &copy; 2026 Hotel Reservasi</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
